services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persistent application data stored in a named volume to avoid
      # shell-expansion issues with paths like ~/...
      - semantic_graph_data:/data
    environment:
      - SEMANTIC_GRAPH_DEBUG=false
      # Override secure loopback default so the API binds on the container
      # interface and is reachable via the published port.
      - SEMANTIC_GRAPH_API_HOST=0.0.0.0
      # Data directory (mounted volume).
      - SEMANTIC_GRAPH_DATA_DIR=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  semantic_graph_data:
    driver: local
